<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Station Météo STM32N6 — IA NPU</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      color: #fff;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 30px 20px 10px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    header p {
      color: #90caf9;
      margin-top: 6px;
      font-size: 0.95rem;
    }
    #status-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #f44336;
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.4s;
    }
    #status-dot.connected { background: #4caf50; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.5)}
      50%{box-shadow:0 0 0 8px rgba(76,175,80,0)}
    }

    /* ── Config panel ── */
    #config-panel {
      max-width: 600px;
      margin: 20px auto;
      background: rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 20px 24px;
      backdrop-filter: blur(10px);
    }
    #config-panel h3 { margin-bottom: 14px; color: #90caf9; font-size:1rem; }
    .cfg-row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
    .cfg-row input {
      flex:1; min-width:140px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 0.85rem;
    }
    .cfg-row input::placeholder { color: rgba(255,255,255,.4); }
    #btn-connect {
      width:100%; padding:10px;
      background: linear-gradient(90deg,#0096c7,#0077b6);
      border:none; border-radius:8px;
      color:#fff; font-size:1rem; font-weight:600;
      cursor:pointer; transition: opacity .2s;
    }
    #btn-connect:hover { opacity:.85; }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 20px auto;
      padding: 0 16px;
    }
    .card {
      background: rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      transition: transform .2s;
    }
    .card:hover { transform: translateY(-3px); }
    .card .icon { font-size: 2.2rem; margin-bottom: 8px; }
    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #90caf9;
    }
    .card .unit  { font-size: 0.85rem; color: rgba(255,255,255,.6); }
    .card .label { font-size: 0.8rem;  color: rgba(255,255,255,.5); margin-top: 4px; }

    /* ── Prédiction IA ── */
    #prediction-box {
      max-width: 900px;
      margin: 0 auto 20px;
      padding: 0 16px;
    }
    .pred-card {
      background: rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .pred-icon { font-size: 3.5rem; }
    .pred-info { flex: 1; min-width: 160px; }
    .pred-meteo {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .pred-meteo.pluie  { color: #90caf9; }
    .pred-meteo.beau   { color: #ffd166; }
    .pred-bars { display: flex; gap: 16px; flex-wrap: wrap; }
    .bar-wrap { flex:1; min-width:120px; }
    .bar-label { font-size: 0.8rem; color: rgba(255,255,255,.6); margin-bottom: 4px; }
    .bar-bg {
      background: rgba(255,255,255,.1);
      border-radius: 20px; height: 12px; overflow: hidden;
    }
    .bar-fill { height:100%; border-radius:20px; transition: width .6s; }
    .bar-fill.pluie { background: linear-gradient(90deg,#0096c7,#023e8a); }
    .bar-fill.beau  { background: linear-gradient(90deg,#ffd166,#f4a261); }
    .bar-pct { font-size: 0.85rem; font-weight:600; margin-top:4px; }

    /* ── Graphique ── */
    #chart-box {
      max-width: 900px;
      margin: 0 auto 30px;
      padding: 0 16px;
    }
    .chart-card {
      background: rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
    }
    .chart-card h3 { color: #90caf9; margin-bottom:14px; font-size:1rem; }

    /* ── Timestamp ── */
    #last-update {
      text-align: center;
      color: rgba(255,255,255,.4);
      font-size: 0.8rem;
      padding-bottom: 20px;
    }

    /* ── Badge NPU ── */
    .npu-badge {
      display: inline-block;
      background: linear-gradient(90deg,#7b2ff7,#f107a3);
      border-radius:20px; padding:3px 10px;
      font-size:0.75rem; font-weight:600;
      margin-left:8px; vertical-align:middle;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>⛅ Station Météo STM32N6 <span class="npu-badge">NPU IA</span></h1>
  <p><span id="status-dot"></span><span id="status-text">Non connecté</span></p>
</header>

<!-- CONFIG TTN -->
<div id="config-panel">
  <h3>🔌 Connexion TTN (The Things Network)</h3>
  <div class="cfg-row">
    <input id="cfg-appid"   placeholder="App ID  (ex: station-meteo-2026)" />
    <input id="cfg-apikey"  type="password" placeholder="API Key TTN (NNSXS.xxxxx)" />
  </div>
  <div class="cfg-row">
    <input id="cfg-region"  placeholder="Région TTN (ex: eu1)" value="eu1" />
    <input id="cfg-device"  placeholder="Device ID (laisser vide = tous)" />
  </div>
  <button id="btn-connect" onclick="connectMQTT()">Se connecter au réseau LoRaWAN</button>
</div>

<!-- CARTES CAPTEURS -->
<div class="cards">
  <div class="card">
    <div class="icon">🌡️</div>
    <div class="value" id="val-temp">--</div>
    <div class="unit">°C</div>
    <div class="label">Température</div>
  </div>
  <div class="card">
    <div class="icon">💧</div>
    <div class="value" id="val-hum">--</div>
    <div class="unit">%</div>
    <div class="label">Humidité</div>
  </div>
  <div class="card">
    <div class="icon">📊</div>
    <div class="value" id="val-pres">--</div>
    <div class="unit">hPa</div>
    <div class="label">Pression</div>
  </div>
  <div class="card">
    <div class="icon">📍</div>
    <div class="value" id="val-alt">--</div>
    <div class="unit">m</div>
    <div class="label">Altitude</div>
  </div>
</div>

<!-- PREDICTION IA -->
<div id="prediction-box">
  <div class="pred-card">
    <div class="pred-icon" id="pred-icon">🌤️</div>
    <div class="pred-info">
      <div class="pred-meteo beau" id="pred-meteo">En attente...</div>
      <div style="color:rgba(255,255,255,.5);font-size:.85rem;">Prédiction IA — STM32N6 NPU</div>
    </div>
    <div class="pred-bars">
      <div class="bar-wrap">
        <div class="bar-label">🌧 Risque pluie</div>
        <div class="bar-bg"><div class="bar-fill pluie" id="bar-pluie" style="width:0%"></div></div>
        <div class="bar-pct" id="pct-pluie" style="color:#90caf9">0%</div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label">☀️ Beau temps</div>
        <div class="bar-bg"><div class="bar-fill beau" id="bar-beau" style="width:0%"></div></div>
        <div class="bar-pct" id="pct-beau" style="color:#ffd166">0%</div>
      </div>
    </div>
  </div>
</div>

<!-- GRAPHIQUE HISTORIQUE -->
<div id="chart-box">
  <div class="chart-card">
    <h3>📈 Historique (dernières 20 mesures)</h3>
    <canvas id="chart-temp" height="80"></canvas>
  </div>
</div>

<div id="last-update">Dernière mise à jour : --</div>

<script>
// ── Données historiques ──
var histLabels = [], histTemp = [], histHum = [], histPres = [];
var MAX_POINTS = 20;

// ── Chart.js ──
var ctx = document.getElementById('chart-temp').getContext('2d');
var chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: histLabels,
    datasets: [
      {
        label: 'Température (°C)',
        data: histTemp,
        borderColor: '#90caf9',
        backgroundColor: 'rgba(144,202,249,.15)',
        tension: 0.4, fill: true, pointRadius: 3
      },
      {
        label: 'Humidité (%)',
        data: histHum,
        borderColor: '#4fc3f7',
        backgroundColor: 'rgba(79,195,247,.1)',
        tension: 0.4, fill: false, pointRadius: 3
      }
    ]
  },
  options: {
    animation: { duration: 400 },
    scales: {
      x: { ticks: { color:'rgba(255,255,255,.5)', maxTicksLimit:8 }, grid: { color:'rgba(255,255,255,.05)' } },
      y: { ticks: { color:'rgba(255,255,255,.5)' },                  grid: { color:'rgba(255,255,255,.05)' } }
    },
    plugins: {
      legend: { labels: { color:'rgba(255,255,255,.7)' } }
    }
  }
});

// ── Connexion MQTT TTN ──
var mqttClient = null;

function connectMQTT() {
  var appId   = document.getElementById('cfg-appid').value.trim();
  var apiKey  = document.getElementById('cfg-apikey').value.trim();
  var region  = document.getElementById('cfg-region').value.trim() || 'eu1';

  if (!appId || !apiKey) {
    alert('Remplis App ID et API Key TTN !');
    return;
  }

  // Sauvegarder dans localStorage
  localStorage.setItem('ttn_appid',  appId);
  localStorage.setItem('ttn_apikey', apiKey);
  localStorage.setItem('ttn_region', region);

  var broker   = region + '.cloud.thethings.network';
  var clientId = 'web_' + Math.random().toString(16).slice(2,8);

  setStatus(false, 'Connexion à TTN...');

  if (mqttClient) try { mqttClient.disconnect(); } catch(e){}

  mqttClient = new Paho.MQTT.Client(broker, 8884, '/mqtt', clientId);

  mqttClient.onConnectionLost = function(e) {
    setStatus(false, 'Déconnecté — ' + e.errorMessage);
  };

  mqttClient.onMessageArrived = function(m) {
    try {
      var raw  = JSON.parse(m.payloadString);
      var data = raw.uplink_message && raw.uplink_message.decoded_payload;
      if (data) updateDashboard(data);
    } catch(e) {}
  };

  mqttClient.connect({
    useSSL: true,
    userName: appId + '@ttn',
    password: apiKey,
    onSuccess: function() {
      setStatus(true, 'Connecté à TTN — En attente de données...');
      mqttClient.subscribe('v3/' + appId + '@ttn/devices/+/up');
    },
    onFailure: function(e) {
      setStatus(false, 'Erreur connexion : ' + e.errorMessage);
    }
  });
}

// ── Mise à jour du dashboard ──
function updateDashboard(d) {
  // Capteurs
  if (d.temperature != null) document.getElementById('val-temp').textContent = d.temperature.toFixed(1);
  if (d.humidity    != null) document.getElementById('val-hum').textContent  = d.humidity.toFixed(1);
  if (d.pressure    != null) document.getElementById('val-pres').textContent = d.pressure.toFixed(1);
  if (d.altitude    != null) document.getElementById('val-alt').textContent  = d.altitude;

  // Prédiction IA
  var pluie = d.pluie_pct || 0;
  var beau  = d.beau_pct  || (100 - pluie);
  var meteo = d.meteo || (pluie >= 50 ? 'PLUIE' : 'BEAU');

  document.getElementById('bar-pluie').style.width = pluie + '%';
  document.getElementById('bar-beau').style.width  = beau  + '%';
  document.getElementById('pct-pluie').textContent = pluie + '%';
  document.getElementById('pct-beau').textContent  = beau  + '%';

  var meteoEl = document.getElementById('pred-meteo');
  var iconEl  = document.getElementById('pred-icon');
  if (meteo === 'PLUIE') {
    meteoEl.textContent = '🌧 PLUIE PROBABLE';
    meteoEl.className   = 'pred-meteo pluie';
    iconEl.textContent  = '🌧';
  } else {
    meteoEl.textContent = '☀️ CIEL DÉGAGÉ';
    meteoEl.className   = 'pred-meteo beau';
    iconEl.textContent  = '☀️';
  }

  // Historique
  var now = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  histLabels.push(now);
  histTemp.push(d.temperature);
  histHum.push(d.humidity);
  histPres.push(d.pressure);
  if (histLabels.length > MAX_POINTS) {
    histLabels.shift(); histTemp.shift(); histHum.shift(); histPres.shift();
  }
  chart.update();

  // Timestamp
  document.getElementById('last-update').textContent =
    'Dernière mise à jour : ' + new Date().toLocaleString('fr-FR');

  setStatus(true, 'Connecté — Données reçues ✓');
}

// ── Statut ──
function setStatus(ok, msg) {
  document.getElementById('status-dot').className = ok ? 'connected' : '';
  document.getElementById('status-text').textContent = msg;
}

// ── Charger les infos sauvegardées ──
window.onload = function() {
  var saved_appid  = localStorage.getItem('ttn_appid');
  var saved_apikey = localStorage.getItem('ttn_apikey');
  var saved_region = localStorage.getItem('ttn_region');
  if (saved_appid)  document.getElementById('cfg-appid').value  = saved_appid;
  if (saved_apikey) document.getElementById('cfg-apikey').value = saved_apikey;
  if (saved_region) document.getElementById('cfg-region').value = saved_region;
};
</script>

</body>
</html>
